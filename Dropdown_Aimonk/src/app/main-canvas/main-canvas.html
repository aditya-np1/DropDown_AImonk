<div class="canvas-container">
  <h1 class="page-title">Nested Tags Tree</h1>
  <div *ngIf="isLoading">
    <p>Loading trees...</p>
  </div>
 
  <div *ngIf="!isLoading" class="trees-container">
    <!-- If no trees, show a button to create the root -->
    
    <div *ngIf="trees.length === 0" class="empty-state">
      <button (click)="addRoot()" class="btn-primary">Create Root Tag</button>
    </div>
    <!-- Render each tree -->
    <div *ngFor="let record of trees; let i = index" class="tree-instance">
      <div class="tree-content">
        <app-tnode [inputNode]="record.tree"></app-tnode>
      </div>

      <div class="export-section">
        <button (click)="exportTree(record)" class="btn-export">Export</button>
      </div>

      <div *ngIf="record.exportedJson" class="json-output">
        <pre>{{ record.exportedJson }}</pre>
      </div>

      <hr *ngIf="i < trees.length - 1" class="separator" />
    </div>
  </div>
</div>
