<div class="universe-wrapper">
  <!-- Twinkling Stars (Static Background) -->
  <div class="stars-container">
    <div *ngFor="let star of stars"
         class="star"
         [style.left.%]="star.x"
         [style.top.%]="star.y"
         [style.width.px]="star.size"
         [style.height.px]="star.size"
         [style.animation-duration.s]="star.duration"
         [style.animation-delay.s]="star.delay">
    </div>
  </div>

  <!-- Static Nebula Glows -->
  <div class="nebula-static nebula-1"></div>
  <div class="nebula-static nebula-2"></div>
